# Render Blueprint — hosts the Braille OCR engine so the deployed InsightEd AI
# app can reach /ocr over HTTPS instead of localhost.
#
# Setup (see docs/hosting_render.md):
#   1. Render Dashboard -> New -> Blueprint -> connect this repo.
#   2. Render creates the service and generates OCR_ENGINE_API_KEY.
#   3. Copy that key into the InsightEd AI app's BRAILLE_OCR_API_KEY, and set
#      BRAILLE_OCR_ENDPOINT to https://<service>.onrender.com/ocr.
#
# The engine holds no pupil data: images are processed in memory and never
# stored. Keep ALLOW_REAL_PUPIL_DATA=false in the app until the school's
# data-protection approval covers sending pupil work to a third-party host.
services:
  - type: web
    name: insighted-braille-ocr
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Closest region to UK users. Free instances sleep after ~15 min idle and
    # cold-start in ~50s — longer than the app's 30s OCR timeout, so warm the
    # service (GET /health) before a demo, or move to `starter` for always-on.
    region: frankfurt
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Render generates a strong random value. /ocr rejects any request that
      # does not present it, so only InsightEd AI can call the engine.
      - key: OCR_ENGINE_API_KEY
        generateValue: true
      # The built-in /demo upload page is a local developer tool; keep it off a
      # public host. InsightEd AI is the product surface.
      - key: DEMO_PAGE_ENABLED
        value: "false"
